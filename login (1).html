<!DOCTYPE html>
<html>
<head>
    <title>Login & Registration</title>
    <meta charset="UTF-8">

<script>
/* LOGIN VALIDATION */
function validateLogin() {
    var username = document.forms["loginForm"]["username"].value;
    var password = document.forms["loginForm"]["password"].value;

    if (username == "" || password == "") {
        alert("All login fields must be filled out");
        return false;
    }

    if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return false;
    }

    return true;
}

/* REGISTRATION VALIDATION */
function validateRegister() {
    var password = document.forms["registerForm"]["reg_password"].value;
    var confirmPassword = document.forms["registerForm"]["confirm_password"].value;

    if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return false;
    }

    if (password != confirmPassword) {
        alert("Passwords do not match");
        return false;
    }

    return true;
}
</script>

</head>

<body bgcolor="#e0f2fe">

<!-- HEADER -->
<table width="100%" bgcolor="#1f2933" cellpadding="15">
<tr>
<td><font color="white" size="6"><b>Login</b></font></td>
<td align="right">
<a href="index.html"><font color="lightgreen">Home</font></a> |
<a href="courses.html"><font color="orange">Courses</font></a>
</td>
</tr>
</table>

<!-- LOGIN FORM -->
<table width="100%" cellpadding="30">
<tr>
<td align="center">
<h2>Student Login</h2>

<form name="loginForm" onsubmit="return validateLogin()">
Username:<br>
<input type="text" name="username" placeholder="Enter username"><br><br>

Password:<br>
<input type="password" name="password"
       placeholder="Minimum 6 characters"><br><br>

<input type="submit" value="Login">
</form>

</td>
</tr>
</table>

<hr width="60%">

<!-- REGISTRATION FORM -->
<table width="100%" cellpadding="30">
<tr>
<td align="center">
<h2>New Student Registration</h2>

<form name="registerForm" onsubmit="return validateRegister()">
Full Name:<br>
<input type="text" name="fullname" required placeholder="Full name"><br><br>

Email:<br>
<input type="email" name="email" required placeholder="example@email.com"><br><br>

Mobile Number:<br>
<input type="tel" name="phone" required pattern="[0-9]{10}"
       placeholder="10 digit number"><br><br>

Select Course:<br>
<select name="course" required>
    <option value="">Select</option>
    <option>HTML</option>
    <option>CSS</option>
    <option>JavaScript</option>
    <option>Web Development</option>
</select><br><br>

Password:<br>
<input type="password" name="reg_password"
       placeholder="Minimum 6 characters"><br><br>

Confirm Password:<br>
<input type="password" name="confirm_password"
       placeholder="Re-enter password"><br><br>

<input type="submit" value="Register">
</form>

</td>
</tr>
</table>

</body>
</html>

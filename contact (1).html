<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us - MITESH</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

nav {
    background: #1f2933;
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
}

nav a {
    color: lightgreen;
    text-decoration: none;
    margin-left: 15px;
}

section {
    padding: 40px 20px;
    text-align: center;
}

#map {
    height: 400px;
    width: 90%;
    max-width: 700px;
    margin: 20px auto;
}

form {
    max-width: 400px;
    margin: auto;
    text-align: left;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #1f2933;
    color: white;
    border: none;
    cursor: pointer;
}

footer {
    background: #1f2933;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<nav>
    <h2>MITESH</h2>
    <div>
        <a href="index.html">Home</a>
        <a href="courses.html">Courses</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<section>
    <h2>Our Location</h2>
    <div id="map"></div>
</section>

<section>
    <h2>Contact Us</h2>
    <form>
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
        <textarea rows="5" placeholder="Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
</section>

<footer>
    © 2026 MITESH. All Rights Reserved.
</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const lat = 19.0760;
const lon = 72.8777;

const map = L.map('map').setView([lat, lon], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

const customIcon = L.divIcon({
    html: `
        <svg width="40" height="40" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" fill="#007BFF"/>
            <circle cx="50" cy="50" r="15" fill="white"/>
        </svg>
    `,
    iconSize: [40, 40],
    iconAnchor: [20, 20]
});

L.marker([lat, lon], { icon: customIcon })
    .addTo(map)
    .bindPopup("Welcome to MITESH")
    .openPopup();
</script>

</body>
</html>
